<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>צ'אט מאגר ידע</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     Sidebar
═══════════════════════════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round"
           stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span>צ'אט מאגר ידע</span>
    </div>
  </div>

  <button class="btn-new-chat" id="btn-new-chat">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    צ'אט חדש
  </button>

  <button class="btn-new-chat" id="btn-upload">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
         stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    העלאת מסמכים
  </button>
  <input type="file" id="file-input" multiple accept=".txt,.pdf,.docx"
         style="display:none" />
  <div class="upload-status" id="upload-status" style="display:none"></div>

  <div class="sidebar-section-title">מצב</div>
  <div class="status-card" id="status-card">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-label">בודק…</span>
  </div>
  <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
    <div class="progress-bar-inner" id="progress-bar"></div>
  </div>

  <div class="sidebar-section-title" style="margin-top:auto">שיחה</div>
  <div class="session-info">
    <span>הודעות: </span><span id="msg-count">0</span>
  </div>
</aside>

<!-- ══════════════════════════════════════════════════════════
     Main
═══════════════════════════════════════════════════════════ -->
<main class="main">

  <!-- Top bar -->
  <header class="topbar">
    <button class="btn-toggle-sidebar" id="btn-toggle-sidebar" aria-label="הצג/הסתר סרגל צד">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="topbar-title">עוזר מאגר הידע</span>
    <span class="topbar-model" id="topbar-model">Amazon Bedrock</span>
  </header>

  <!-- Messages -->
  <section class="messages" id="messages" role="log" aria-live="polite">

    <!-- Welcome card shown on first load -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h2>שאלו את מאגר הידע</h2>
      <p>
        הקלידו שאלה למטה. העוזר מאחזר את הקטעים הרלוונטיים מהמסמכים שלכם
        ומחזיר תשובה מבוססת מקורות.
      </p>
      <div class="welcome-chips">
        <button class="chip" data-q="על מה עוסק מאגר הידע הזה?">על מה זה?</button>
        <button class="chip" data-q="סכם את הנושאים המרכזיים.">נושאים מרכזיים</button>
        <button class="chip" data-q="מהם הממצאים העיקריים?">ממצאים עיקריים</button>
      </div>
    </div>

  </section>

  <!-- Input area -->
  <footer class="input-area">
    <div class="input-wrap">
      <textarea
        id="user-input"
        rows="1"
        placeholder="שאלו כל דבר על המסמכים שלכם…"
        aria-label="תיבת הודעה"
      ></textarea>
      <button class="btn-send" id="btn-send" aria-label="שלח">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
             stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">
      התשובות מבוססות על המסמכים שלכם · מופעל על ידי Amazon Bedrock
    </p>
  </footer>

</main>

<!-- ══════════════════════════════════════════════════════════
     Templates (cloned by JS, never shown directly)
═══════════════════════════════════════════════════════════ -->

<!-- User message bubble -->
<template id="tpl-user">
  <div class="message message--user">
    <div class="bubble bubble--user">
      <p class="msg-text"></p>
    </div>
  </div>
</template>

<!-- Assistant message bubble -->
<template id="tpl-assistant">
  <div class="message message--assistant">
    <div class="avatar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <div class="bubble bubble--assistant">
      <p class="msg-text"></p>
      <div class="sources" style="display:none">
        <button class="sources-toggle" aria-expanded="false">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          <span class="sources-label">מקורות</span>
        </button>
        <ul class="sources-list"></ul>
      </div>
    </div>
  </div>
</template>

<!-- Thinking / loading indicator -->
<template id="tpl-thinking">
  <div class="message message--assistant" id="msg-thinking">
    <div class="avatar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <div class="bubble bubble--assistant bubble--thinking">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </div>
</template>

<script src="/static/js/chat.js"></script>
</body>
</html>
